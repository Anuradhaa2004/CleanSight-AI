<!-- CleanIndia/templates/success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint Submitted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/success.css') }}?v=1.1" />
</head>
<body>
  <div class="success-page d-flex align-items-center justify-content-center">
    <div class="circuit-overlay" aria-hidden="true"></div>

    <main class="success-wrapper text-center">
      <h1 class="success-title main-title mb-5">
        Thank You for submitting your<span>complaint.</span>
      </h1>

      <section class="success-card neon-card mx-auto">
        <div class="card-glow-line" aria-hidden="true"></div>

        <div class="icon-wrap" aria-hidden="true">
          <img src="{{ url_for('static', path='images/envelop.png') }}" alt="Confirmation envelope" class="mail-image" />
        </div>

        <p class="message-text mb-5">
          Please check your email for a detailed confirmation
          and further communication from the authority
          regarding your complaint submission.
        </p>
        <p class="tracking-id mb-4">
          Tracking ID: <strong>{{ tracking_id }}</strong>
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center align-items-center gap-3">
          <a href="{{ url_for('get_ai_report_page', tracking_id=tracking_id) }}" class="btn success-btn btn-citizen">Citizen Desk</a>
          <a href="{{ url_for('home') }}" class="btn success-btn btn-home">Home</a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', path='js/success.js') }}"></script>
</body>
</html>
