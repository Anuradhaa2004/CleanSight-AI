<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Waste - CleanIndia AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --nature-green: #2d6a4f;
            --light-leaf: #95d5b2;
            --soft-white: #f8f9fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1542601906990-b4d3fb773b09?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 550px;
            width: 100%;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 2px solid var(--light-leaf);
        }

        .form-header h3 {
            color: var(--nature-green);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--nature-green);
            box-shadow: 0 0 10px rgba(45, 106, 79, 0.2);
            transform: translateY(-2px);
        }

        .btn-success {
            background-color: var(--nature-green);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }

        .btn-success:hover {
            background-color: #1b4332;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
        }

        .form-label {
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
        }

        /* Loading spinner for GPS */
        .gps-status {
            font-size: 0.85rem;
            margin-top: 10px;
            display: block;
        }

        .icon-box {
            font-size: 2.5rem;
            color: var(--nature-green);
            margin-bottom: 10px;
        }

        /* Animations for sections */
        .animate__delay-1s { animation-delay: 0.2s; }
        .animate__delay-2s { animation-delay: 0.4s; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="form-card animate__animated animate__fadeInUp">
        <div class="form-header text-center mb-4">
            <div class="icon-box">🌿</div>
            <h3>CleanIndia AI</h3>
            <p class="text-muted">Report waste to save our environment</p>
        </div>
        
        <form action="/submit-ticket" method="post" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3 animate__animated animate__fadeInLeft animate__delay-1s">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="u_name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="col-md-6 mb-3 animate__animated animate__fadeInRight animate__delay-1s">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="u_email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3 animate__animated animate__fadeInLeft animate__delay-1s">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" name="u_mobile" class="form-control" placeholder="10-digit number" required>
                </div>
                <div class="col-md-6 mb-3 animate__animated animate__fadeInRight animate__delay-1s">
                    <label class="form-label">Ward Number</label>
                    <input type="number" name="ward" class="form-control" placeholder="Enter Ward No.">
                </div>
            </div>

            <div class="mb-3 animate__animated animate__fadeInUp animate__delay-1s">
                <label class="form-label">Waste Location Address</label>
                <textarea name="u_address" class="form-control" rows="2" placeholder="Street name, Landmark, City..." required></textarea>
            </div>

            <div class="mb-4 animate__animated animate__fadeInUp animate__delay-2s">
                <label class="form-label">Upload Evidence (Photo)</label>
                <input type="file" name="file" class="form-control" accept="image/*" required>
                <small class="text-muted">Upload a clear photo as evidence.</small>
            </div>

            <input type="hidden" name="lat" id="lat" value="0.0">
            <input type="hidden" name="lon" id="lon" value="0.0">

            <div class="text-center animate__animated animate__zoomIn animate__delay-2s">
                <button type="submit" id="submitBtn" class="btn btn-success w-100">
                    Submit Complaint 🚀
                </button>
                <span id="locationMsg" class="gps-status text-warning fw-bold">Searching for GPS Signal...</span>
            </div>
        </form>
    </div>
</div>

<script>
    // Pure logic remains same, only UI interactions added
    window.onload = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                document.getElementById('lat').value = position.coords.latitude;
                document.getElementById('lon').value = position.coords.longitude;
                
                // Update UI once location is found
                const msg = document.getElementById('locationMsg');
                msg.innerHTML = "Location Fixed ✅ (" + position.coords.latitude.toFixed(2) + ")";
                msg.classList.replace('text-warning', 'text-success');
                
                console.log("GPS Found: " + position.coords.latitude);
            }, function(error) {
                document.getElementById('locationMsg').innerHTML = "GPS Access Denied ❌";
                document.getElementById('locationMsg').classList.replace('text-warning', 'text-danger');
            }, { enableHighAccuracy: true });
        }
    };

    // Form submission effect
    document.querySelector('form').onsubmit = function() {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing Complaint...';
        btn.disabled = true;
    };
</script>

</body>
</html>
