<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CleanIndia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/L&S.css') }}">
</head>
<body>
    <main class="login-shell">
        <div class="mesh-layer" aria-hidden="true"></div>
        <div class="blob blob-a" aria-hidden="true"></div>
        <div class="blob blob-b" aria-hidden="true"></div>
        <div class="blob blob-c" aria-hidden="true"></div>

        <section class="glass-card" aria-label="Signup Card">
            <header class="card-head">
                <h1>Create Your Account</h1>
                <p>Join CleanIndia and start reporting civic issues faster.</p>
            </header>

            <div class="social-row">
                <a href="/login/google" id="googleSignupBtn" class="social-btn google-btn">
                    <img
                        class="social-logo"
                        src="{{ request.url_for('static', path='images/Google_logo.png') }}"
                        alt="Google logo"
                    >
                    <span>Google</span>
                </a>
                <button id="facebookFillBtn" type="button" class="social-btn facebook-btn">
                    <img
                        class="social-logo"
                        src="{{ request.url_for('static', path='images/facebook_logo.png') }}"
                        alt="Facebook logo"
                    >
                    <span>Facebook</span>
                </button>
            </div>

            <form id="signupForm" method="post" action="/signup-submit" autocomplete="on">
                <input type="hidden" id="nextUrl" name="next_url" value="/home">
                <input type="hidden" id="profileUrlHidden" name="profile_url" value="">

                <label class="input-wrap" for="username">
                    <i class="bi bi-person-fill"></i>
                    <input id="username" name="username" type="text" placeholder="Full Name" required>
                </label>

                <label class="input-wrap" for="email">
                    <i class="bi bi-envelope-fill"></i>
                    <input id="email" name="email" type="email" placeholder="Email Address" required>
                </label>

                <label class="input-wrap" for="password">
                    <i class="bi bi-lock-fill"></i>
                    <input id="password" name="password" type="password" placeholder="Password" required>
                    <button id="togglePasswordBtn" type="button" class="toggle-pass-btn" aria-label="Show password">
                        <i id="togglePasswordIcon" class="bi bi-eye"></i>
                    </button>
                </label>

                <label class="input-wrap" for="confirmPassword">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input id="confirmPassword" name="confirm_password" type="password" placeholder="Confirm Password" required>
                    <button id="toggleConfirmPasswordBtn" type="button" class="toggle-pass-btn" aria-label="Show confirm password">
                        <i id="toggleConfirmPasswordIcon" class="bi bi-eye"></i>
                    </button>
                </label>

                <p id="signupError" class="form-error d-none">Passwords do not match.</p>

                <button type="submit" class="login-btn">Sign Up</button>
            </form>

            <footer class="card-foot">
                <span>Already have an account?</span>
                <a href="/login">Log in</a>
            </footer>
        </section>
    </main>

    <script src="{{ request.url_for('static', path='js/L&S.js') }}" defer></script>
</body>
</html>
